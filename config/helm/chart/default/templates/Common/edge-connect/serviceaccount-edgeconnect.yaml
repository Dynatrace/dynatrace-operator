apiVersion: v1
kind: ServiceAccount
metadata:
  name: dynatrace-edgeconnect
  namespace: {{ .Release.Namespace }}
  {{- if .Values.rbac.edgeConnect.annotations }}
  annotations:
    {{- toYaml .Values.rbac.edgeConnect.annotations | nindent 4 }}
  {{- end }}
  labels:
    {{- include "dynatrace-operator.operatorLabels" . | nindent 4 }}
{{ end }}
