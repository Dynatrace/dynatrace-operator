suite: test kspm clusterrole for kubernetes monitoring
templates:
  - Common/activegate/kubernetes-monitoring/clusterrole-kubernetes-monitoring-kspm.yaml
tests:
  - it: ClusterRole should exist
    documentIndex: 0
    asserts:
      - isKind:
          of: ClusterRole
      - equal:
          path: metadata.name
          value: dynatrace-kubernetes-monitoring-kspm
      - isNotEmpty:
          path: metadata.labels
      - isNotEmpty:
          path: rules
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - namespaces
              - nodes
              - pods
              - replicationcontrollers
              - serviceaccounts
              - services
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - batch
            resources:
              - cronjobs
              - jobs
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - apps
            resources:
              - daemonsets
              - deployments
              - replicasets
              - statefulsets
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - networking.k8s.io
            resources:
              - networkpolicies
            verbs:
              - get
              - list
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - rbac.authorization.k8s.io
            resources:
              - clusterrolebindings
              - clusterroles
              - rolebindings
              - roles
            verbs:
              - get
              - list
              - watch

  - it: ClusterRoleBinding should exist
    documentIndex: 1
    asserts:
      - isKind:
          of: ClusterRoleBinding
      - equal:
          path: metadata.name
          value: dynatrace-kubernetes-monitoring-kspm
      - isNotEmpty:
          path: metadata.labels
      - equal:
          path: roleRef
          value:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: dynatrace-kubernetes-monitoring-kspm
      - contains:
          path: subjects
          content:
            kind: ServiceAccount
            name: dynatrace-activegate
            namespace: NAMESPACE

  - it: shouldn't exist if turned off
    set:
      rbac.kspm.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should fail if only kspm is turned on
    set:
      rbac.kubernetesMonitoring.create: false
      rbac.kspm.create: true
    asserts:
     - failedTemplate: {}
