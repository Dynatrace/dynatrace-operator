suite: test clusterrole for the extension execution controller
templates:
  - Common/extensions/clusterrole-extension-controller.yaml
tests:
  - it: ClusterRole and ClusterRoleBinding exist by default
    asserts:
      - hasDocuments:
          count: 2

  - it: ClusterRole has correct permissions for cluster-wide pod and service discovery
    documentIndex: 0
    asserts:
      - isKind:
          of: ClusterRole
      - equal:
          path: metadata.name
          value: dynatrace-extension-controller
      - isNotEmpty:
          path: metadata.labels
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - pods
              - services
            verbs:
              - list
              - watch

  - it: ClusterRoleBinding has correct name and labels
    documentIndex: 1
    asserts:
      - isKind:
          of: ClusterRoleBinding
      - equal:
          path: metadata.name
          value: dynatrace-extension-controller
      - isNotEmpty:
          path: metadata.labels

  - it: ClusterRole should contain SCC rule on OpenShift
    documentIndex: 0
    set:
      platform: openshift
    asserts:
      - isKind:
          of: ClusterRole
      - contains:
          path: rules
          content:
            apiGroups:
              - security.openshift.io
            resourceNames:
              - nonroot-v2
            resources:
              - securitycontextconstraints
            verbs:
              - use

  - it: ClusterRole should not contain SCC rule on non-OpenShift
    documentIndex: 0
    asserts:
      - isKind:
          of: ClusterRole
      - notContains:
          path: rules
          content:
            apiGroups:
              - security.openshift.io
            resourceNames:
              - nonroot-v2
            resources:
              - securitycontextconstraints
            verbs:
              - use

  - it: shouldn't exist if extensions are turned off
    set:
      rbac.extensions.create: false
    asserts:
      - hasDocuments:
          count: 0
