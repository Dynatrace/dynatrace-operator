  publishedVersionMetadata:
    releaseNote: "<!-- Release notes generated using configuration in .github/release.yml at v1.10.0 -->\n\n## What's Changed\n### Bugfixes \U0001FAB2\n* Fix preflight check on CI by @waodim in https://github.com/Dynatrace/dynatrace-operator/pull/6382\n* Do not fail if just created Service is not yet available by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6403\n* Merge k8sentity and apimonitoring reconcilers by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6396\n* Add missing cleanup step for meid E2E test by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6409\n* Fix what the Operator controller owns by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6420\n* Avoid conflict during upgrade operator and clusterrole-aggregation-controller rules [ICP-2250] (#6430) by @andriisoldatenko in https://github.com/Dynatrace/dynatrace-operator/pull/6438\n* Reconcile kspm before OA and LogMonitoring to avoid deadlock when OA connectioninfo is empty by @aorcholski in https://github.com/Dynatrace/dynatrace-operator/pull/6425\n* Fix GitHub Action used for updating CSV bundles by @Incredible-O in https://github.com/Dynatrace/dynatrace-operator/pull/6456\n* Don't keep stale client in AG reconcile by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6501\n* Remove gke-autopilot file from github releases by @gkrenn in https://github.com/Dynatrace/dynatrace-operator/pull/6506\n* Validate install-path at injection time by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6504\n* Make dtClient cache opt-in per response by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6516\n* bugfix: move certgen to init-to-crd-job by @andriisoldatenko in https://github.com/Dynatrace/dynatrace-operator/pull/6549\n* Fix otelc template annotation propagation by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6682\n* Repeat registration procedure if the CSI driver is no longer registered by @aorcholski in https://github.com/Dynatrace/dynatrace-operator/pull/6740\n* Add check for stale network-zone AG Service IPs by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6738\n* Bump dynatrace-bootstrapper version to 1.4.1 by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6781\n* Disable OTELC probes when EEC and prometheus is enabled by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6815\n* Bump dynatrace-bootstrapper to v1.4.3 by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6888\n* Do not create/attach tenant pull-secret when public-registry FF is used by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6926\n* Fix pull-secret helper by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6936\n* Add resources for OA DS init container by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6947\n### Core changes \U0001F389\n* Reduce automated pull request branch name length by @avorima with @Copilot in https://github.com/Dynatrace/dynatrace-operator/pull/6345\n* Reduce permissions on readonly mounted files by @aorcholski in https://github.com/Dynatrace/dynatrace-operator/pull/6292\n* Clean up bundle images by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6346\n* ci: Replace python scripts with bash by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6360\n* chore(deps): update aquasecurity/trivy-action action to v0.35.0 (main) by @renovate[bot] in https://github.com/Dynatrace/dynatrace-operator/pull/6366\n* [Automatic] Update because new branch created release-1.9 by @operator-bot-account[bot] in https://github.com/Dynatrace/dynatrace-operator/pull/6357\n* add olm e2e test by @andriisoldatenko in https://github.com/Dynatrace/dynatrace-operator/pull/6335\n* add prerequisites/operator-sdk to bundle/run by @andriisoldatenko in https://github.com/Dynatrace/dynatrace-operator/pull/6384\n* chore(deps): update zizmorcore/zizmor-action action to v0.5.2 (main) by @renovate[bot] in https://github.com/Dynatrace/dynatrace-operator/pull/6362\n* Fix issues with create marketplace forks action by @s-quatres in https://github.com/Dynatrace/dynatrace-operator/pull/6383\n* Fix preflight CI step by @Incredible-O in https://github.com/Dynatrace/dynatrace-operator/pull/6392\n* add OLM tests to ondemand pipeline by @andriisoldatenko in https://github.com/Dynatrace/dynatrace-operator/pull/6391\n* Consider helm/go files changes in build/push/olm [ICP-1145] by @andriisoldatenko in https://github.com/Dynatrace/dynatrace-operator/pull/6415\n* ci: added sync-openapi-schema workflow by @svfoxat in https://github.com/Dynatrace/dynatrace-operator/pull/6375\n* Bump golang.org/x/net dependency to fix CVE by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6424\n* Reject non-DNS1035 DynaKube names in the CSI driver by @Incredible-O in https://github.com/Dynatrace/dynatrace-operator/pull/6426\n* feat: generating go clients for openapi schemas by @svfoxat in https://github.com/Dynatrace/dynatrace-operator/pull/6436\n* Fixes the problem of too long labels based on branch name by @aorcholski in https://github.com/Dynatrace/dynatrace-operator/pull/6434\n* Update actions/setup-go action to v6.4.0 (main) by @renovate[bot] in https://github.com/Dynatrace/dynatrace-operator/pull/6442\n* Update actions/cache action to v5.0.4 (main) by @renovate[bot] in https://github.com/Dynatrace/dynatrace-operator/pull/6348\n* Update dependency helm/helm to v4.1.4 (main) by @renovate[bot] in https://github.com/Dynatrace/dynatrace-operator/pull/6352\n* Fix fetch-depth ternary circuit by @mihaitanasedt in https://github.com/Dynatrace/dynatrace-operator/pull/6422\n* Address dependency vulnerabilities by @Incredible-O in https://github.com/Dynatrace/dynatrace-operator/pull/6459\n* Update actions/setup-node action to v6.3.0 (main) by @renovate[bot] in https://github.com/Dynatrace/dynatrace-operator/pull/6449\n* Ref