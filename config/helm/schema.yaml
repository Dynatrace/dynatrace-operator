/github.com/Dynatrace/dynatrace-operator/pull/6368\n* Remove aggregated ClusterRole by @andriisoldatenko in https://github.com/Dynatrace/dynatrace-operator/pull/6407\n* Add CSI migration option to helm by @waodim in https://github.com/Dynatrace/dynatrace-operator/pull/6429\n* Add .spec.resourceAttributes, .spec.oneagent.*.additionlResourceAttri… by @StefanHauth in https://github.com/Dynatrace/dynatrace-operator/pull/6478\n* Remove `post-delete` from AllowlistSynchronizer by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6518\n* Make v1beta4 unserved version by @aorcholski in https://github.com/Dynatrace/dynatrace-operator/pull/6484\n* Store tenantPhase in dk (only API changes, no other logic) by @waodim in https://github.com/Dynatrace/dynatrace-operator/pull/6552\n* Revert \"Store tenantPhase in dk (only API changes, no other logic) (#6552)\" by @waodim in https://github.com/Dynatrace/dynatrace-operator/pull/6556\n* Propagate resource attributes to DaemonSet based OneAgent modes by @waodim in https://github.com/Dynatrace/dynatrace-operator/pull/6551\n* Set dnsPolicy if values.webhook.hostNetwork is enabled by @aorcholski in https://github.com/Dynatrace/dynatrace-operator/pull/6600\n* use-public-registry FF + dk.spec.PublicRegistryOverride by @jokuniew in https://github.com/Dynatrace/dynatrace-operator/pull/6553\n* Add image digest field to imageRef spec by @waodim in https://github.com/Dynatrace/dynatrace-operator/pull/6681\n* bump controller-gen.kubebuilder.io/version to v0.21.0 in crd template - make doc by @jokuniew in https://github.com/Dynatrace/dynatrace-operator/pull/6706\n* Tighten (additional)resourceAttributes validation by @waodim in https://github.com/Dynatrace/dynatrace-operator/pull/6745\n* Add NodeSelector to OtelC in DynaKube by @waodim in https://github.com/Dynatrace/dynatrace-operator/pull/6758\n* Add extra permissions for logmonitoring clusterrole. by @s-quatres in https://github.com/Dynatrace/dynatrace-operator/pull/6791\n* Add configurable cache cleanup period (via helm+env) by @waodim in https://github.com/Dynatrace/dynatrace-operator/pull/6796\n* Add configuration option for init container resources to DynaKube by @StefanHauth in https://github.com/Dynatrace/dynatrace-operator/pull/6788\n* Handle new settings field by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6678\n* feat: configurable requeueAfter for dynakube controller by @svfoxat in https://github.com/Dynatrace/dynatrace-operator/pull/6782\n* Cluster wide pod/service list/watch permissions for EEC. by @StefanHauth in https://github.com/Dynatrace/dynatrace-operator/pull/6832\n* Run make doc by @StefanHauth in https://github.com/Dynatrace/dynatrace-operator/pull/6848\n* Add fine grained auth option and logic to helm chart, use it for logmonitoring clusterrole. by @s-quatres in https://github.com/Dynatrace/dynatrace-operator/pull/6853\n* Simplify helm template boolean helper checks by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6858\n* Remove `oneAgentInitResources` reuse `oneAgentResources` instead by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6958\n### Component changes \U0001F6E0️\n* Introduce e2e tests for HPA support by @mihaitanasedt in https://github.com/Dynatrace/dynatrace-operator/pull/6369\n* Implement OneAgent client - version & dtClient builderV2 for csiprovisioner and urlinstaller  by @jokuniew in https://github.com/Dynatrace/dynatrace-operator/pull/6390\n* Migrate apparmor annotation into security context by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6431\n* Enforce spelling of OS by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6479\n* Propagate resource attributes to `deployment.properties` for ActiveGate by @gkrenn in https://github.com/Dynatrace/dynatrace-operator/pull/6544\n* Create consts for the DTComponentsSecretsRootDir used in many components by @gkrenn in https://github.com/Dynatrace/dynatrace-operator/pull/6557\n* Make node-image-pull only affect the CSI Job by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6684\n* rename classicFullstack to classicFullStack in func names and strings by @jokuniew in https://github.com/Dynatrace/dynatrace-operator/pull/6704\n* Use go 1.26 new instead of ptr.To by @andriisoldatenko in https://github.com/Dynatrace/dynatrace-operator/pull/6707\n* Propagate resourceAttributes on injection by @StefanHauth in https://github.com/Dynatrace/dynatrace-operator/pull/6693\n* ICP-5582: Deprecate k8s-app-enabled feature flag by @gkrenn in https://github.com/Dynatrace/dynatrace-operator/pull/6822\n* Set permissions of dynakube-internal-proxy files to 0o640 (release-1.10) by @aorcholski in https://github.com/Dynatrace/dynatrace-operator/pull/6959\n### Documentation changes \U0001F4DA\n* fix apimonitoring dead link in ARCHITECTURE.md by @jokuniew in https://github.com/Dynatrace/dynatrace-operator/pull/6421\n* Skip scaling e2e tests when E2E_SKIP_SCALING=true by @avorima with @Copilot in https://github.com/Dynatrace/dynatrace-operator/pull/6400\n\n## New Contributors\n* @avorima with @Copilot made their first contribution in https://github.com/Dynatrace/dynatrace-operator/pull/6345\n* @knQzx made their first contribution in https://github.com/Dynatrace/dynatrace-operator/pull/6536\n\n**Full Changelog**: https://github.com/Dynatrace/dynatrace-operator/compare/v1.9.0...v1.10.0\n"
    releaseTypes:
