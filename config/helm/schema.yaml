x-google-marketplace:
  schemaVersion: v2
  applicationApiVersion: v1beta1
  publishedVersion: 1.10.0
  publishedVersionMetadata:
    releaseNote: >-
      ## What's Changed
      ### Bugfixes
      * Check for unsafe hard links when unpacking codeModulesImage in CSI by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6387
      * Do not fail if just created Service is not yet available by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6403
      * Fix race condition in webhook event recorder by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6404
      * Fix what the Operator controller owns by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6420
      * Reconcile kspm before OA and LogMonitoring to avoid deadlock by @aorcholski in https://github.com/Dynatrace/dynatrace-operator/pull/6425
      * Avoid conflict during upgrade with clusterrole-aggregation-controller rules by @andriisoldatenko in https://github.com/Dynatrace/dynatrace-operator/pull/6430
      * Do not mount tenant registry pull secret to non-OA/AG components by @StefanHauth in https://github.com/Dynatrace/dynatrace-operator/pull/6432
      * Do not treat ServerError struct as error by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6487
      * Don't keep stale client in AG reconcile by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6501
      * Fix dynakube configuration so that AG auto-tls-cert is created by the operator by @aorcholski in https://github.com/Dynatrace/dynatrace-operator/pull/6503
      * Validate install-path at injection time by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6504
      * Make dtClient cache opt-in per response by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6516
      * Fix: preserve TelemetryIngest spec in v1beta5 ConvertFrom by @knQzx in https://github.com/Dynatrace/dynatrace-operator/pull/6536
      * Move certgen to init-to-crd-job by @andriisoldatenko in https://github.com/Dynatrace/dynatrace-operator/pull/6549
      * Filter out invalid symlinks that attempt to escape the extraction directory by @aorcholski in https://github.com/Dynatrace/dynatrace-operator/pull/6562
      * Fix otelc template annotation propagation by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6682
      * Add check for stale network-zone AG Service IPs by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6738
      * Repeat registration procedure if the CSI driver is no longer registered by @aorcholski in https://github.com/Dynatrace/dynatrace-operator/pull/6740
      * Disable OTELC probes when EEC and prometheus is enabled by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6815
      * Fix EdgeConnect imageRef.digest having no effect on image selected by @waodim in https://github.com/Dynatrace/dynatrace-operator/pull/6884
      * Fix API URL handling for 3rd gen by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6921
      * Do not create/attach tenant pull-secret when public-registry FF is used by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6926
      * Always read token secret for validation by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6929
      * Fix pull-secret helper by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6936
      * Add resources for OA DS init container by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6947

      ### Security fixes
      * Reject non-DNS1035 DynaKube names in the CSI driver by @Incredible-O in https://github.com/Dynatrace/dynatrace-operator/pull/6426
      * Address dependency vulnerabilities by @Incredible-O in https://github.com/Dynatrace/dynatrace-operator/pull/6459
      * Update mxmCherry/spdystream to fix CVE by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6514
      * Bump go version and golang.org/x packages (CVE) by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6560
      * Validate env refs in resource attributes by @Incredible-O in https://github.com/Dynatrace/dynatrace-operator/pull/6762

      ### Component changes
      * Move setup into init containers by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6368
      * Support archive collects info about OOMKilled AGs by @svfoxat in https://github.com/Dynatrace/dynatrace-operator/pull/6411
      * Migrate apparmor annotation into security context by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6431
      * Set Kubernetes recommended labels by @aorcholski in https://github.com/Dynatrace/dynatrace-operator/pull/6453
      * Add .spec.resourceAttributes to DynaKube by @StefanHauth in https://github.com/Dynatrace/dynatrace-operator/pull/6478
      * Detect platform tokens by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6483
      * Allow DynaKubes with 3rd gen API URL by @waodim in https://github.com/Dynatrace/dynatrace-operator/pull/6496
      * Deprecate paasToken by @aorcholski in https://github.com/Dynatrace/dynatrace-operator/pull/6499
      * Display each deprecated feature flag as a separate warning message by @svfoxat in https://github.com/Dynatrace/dynatrace-operator/pull/6519
      * Remove dynatrace.com/updated-via-operator annotation by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6521
      * Add platform token handling for dtpullsecret by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6523
      * Skip token scope checks when platform token is used by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6550
      * Propagate resource attributes to DaemonSet based OneAgent modes by @waodim in https://github.com/Dynatrace/dynatrace-operator/pull/6551
      * Add use-public-registry feature flag and PublicRegistryOverride by @jokuniew in https://github.com/Dynatrace/dynatrace-operator/pull/6553
      * Change permissions of the appmounts directory by @aorcholski in https://github.com/Dynatrace/dynatrace-operator/pull/6554
      * Add data ingest token hash to OTelC manifest to trigger restarts on token rotation by @StefanHauth in https://github.com/Dynatrace/dynatrace-operator/pull/6602
      * Add image digest field to imageRef spec by @waodim in https://github.com/Dynatrace/dynatrace-operator/pull/6681
      * Configurable requeueAfter for dynakube controller by @svfoxat in https://github.com/Dynatrace/dynatrace-operator/pull/6782
      * Add configuration option for init container resources to DynaKube by @StefanHauth in https://github.com/Dynatrace/dynatrace-operator/pull/6788
      * Add configurable cache cleanup period (via helm+env) by @waodim in https://github.com/Dynatrace/dynatrace-operator/pull/6796
      * Add cluster name as env var to EEC StatefulSet by @StefanHauth in https://github.com/Dynatrace/dynatrace-operator/pull/6820
      * Deprecate k8s-app-enabled feature flag by @gkrenn in https://github.com/Dynatrace/dynatrace-operator/pull/6822
      * Cluster wide pod/service list/watch permissions for EEC by @StefanHauth in https://github.com/Dynatrace/dynatrace-operator/pull/6832
      * Change default AG TopologySpreadConstraint to ScheduleAnyway by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6872
      * Deprecate link extraction from codemodules image by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6915
      * Set permissions of dynakube-internal-proxy files to 0o640 by @aorcholski in https://github.com/Dynatrace/dynatrace-operator/pull/6959

      ### Helm changes
      * Add CSI migration option to helm by @waodim in https://github.com/Dynatrace/dynatrace-operator/pull/6429
      * Set dnsPolicy if values.webhook.hostNetwork is enabled by @aorcholski in https://github.com/Dynatrace/dynatrace-operator/pull/6600
      * Add digest field to helm values by @waodim in https://github.com/Dynatrace/dynatrace-operator/pull/6703
      * Add fine grained auth option for logmonitoring clusterrole by @s-quatres in https://github.com/Dynatrace/dynatrace-operator/pull/6853
      * Remove oneAgentInitResources, reuse oneAgentResources instead by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6958

      ### EdgeConnect changes
      * Refactor EdgeConnect client by @mihaitanasedt in https://github.com/Dynatrace/dynatrace-operator/pull/6406
      * Add EdgeConnect oauth.endpoint validation by @aorcholski in https://github.com/Dynatrace/dynatrace-operator/pull/6540
      * Add validation to EdgeConnect apiServer by @Edivion in https://github.com/Dynatrace/dynatrace-operator/pull/6746

      **Full Changelog**: https://github.com/Dynatrace/dynatrace-operator/compare/v1.9.0...v1.10.0
    releaseTypes:
    - Feature
    recommended: true
  managedUpdates:
    kalmSupported: true
  images:
    ? ''
    : properties:
        image:
          type: FULL
  deployerServiceAccount:
    description: 'Service account used to configure the Dynatrace Operator'
    roles:
    - type: ClusterRole
      rulesType: CUSTOM
      rules:
      - apiGroups:
        - admissionregistration.k8s.io
        resources:
        - mutatingwebhookconfigurations
        verbs:
        - get
        - create
        - list
        - patch
      - apiGroups:
        - dynatrace.com
        resources:
        - dynakubes
        verbs:
        - get
        - list
        - create
        - patch
      - apiGroups:
        - apiextensions.k8s.io
        resources:
        - customresourcedefinitions
        verbs:
        - get
        - list
        - create
        - patch
      - apiGroups:
        - dynatrace.com
        resources:
        - dynakubes
        verbs:
        - get
        - list
        - watch
        - update
        - patch
      - apiGroups:
        - app.k8s.io
        resources:
        - applications
        verbs:
        - get
        - list
      - apiGroups:
        - storage.k8s.io
        resources:
        - csidrivers
        verbs:
        - '*'
      - apiGroups:
        - ''
        resources:
        - services
        - serviceaccounts
        verbs:
        - '*'
      - apiGroups:
        - rbac.authorization.k8s.io
        resources:
        - role
        - rolebinding
        - clusterroles
        - clusterrolebindings
        verbs:
        - '*'
      - apiGroups:
        - admissionregistration.k8s.io
        resources:
        - validatingwebhookconfigurations
        verbs:
        - '*'
      - apiGroups:
        - scheduling.k8s.io
        resources:
        - priorityclasses
        verbs:
          - get
          - create
          - patch
properties:
  name:
    type: string
    x-google-marketplace:
      type: NAME
  namespace:
    type: string
    x-google-marketplace:
      type: NAMESPACE
    default: dynatrace
  deployerHelm.image:
    type: string
    x-google-marketplace:
      type: DEPLOYER_IMAGE
  customPullSecret:
    type: string
    title: Custom pull secret
    description: If the Operator image is in a private registry, the name of the appropriate pull secret can be set here
    default: ""

  imageRef.pullPolicy:
    type: string
    title: Operator image pull policy
    description: Overrite the default image pull policy for the operator.
    default: ""
    enum:
      - IfNotPresent
      - Always
      - Never

  operator.apparmor:
    type: boolean
    title: Enables AppArmor for Operator
    description: |
      AppArmor is a security system for Linux.
      If a cluster supports AppArmor the Operator uses it if it is enabled here.
      If it is not supported by a cluster it must not be enabled.
    default: false
  operator.requests.cpu:
    type: string
    title: Operator CPU request
    description: The amount of CPU allocation the Operator requests from the cluster.
    default: 50m
  operator.requests.memory:
    type: string
    title: Operator Memory request
    description: The amount of memory allocation the Operator requests from the cluster.
    default: 64Mi
  operator.limits.cpu:
    type: string
    title: Operator  CPU limit
    description: The amount of CPU allocation to which the cluster may limit the Operator.
    default: 100m
  operator.limits.memory:
    type: string
    title: Operator Memory limit
    description: The amount of memory allocation to which the cluster may limit the Operator.
    default: 128Mi
  operator.startupProbe.periodSeconds:
    type: integer
    title: Operator startup probe periodSeconds
    description: How often (in seconds) to perform the startup probe. Defaults to 10.
  operator.startupProbe.timeoutSeconds:
    type: integer
    title: Operator startup probe timeoutSeconds
    description: Number of seconds after which the startup probe times out. Defaults to 5.
  operator.startupProbe.failureThreshold:
    type: integer
    title: Operator startup probe failureThreshold
    description: Number of times the startup probe can fail before giving up. Defaults to 1.

  webhook.hostNetwork:
    type: boolean
    title: Webhook uses Host network
    description: |
      Allows the webhook to connect with and use the same network as the node.
      May alleviate issues with container network interfaces (CNI).
    default: false
  webhook.apparmor:
    type: boolean
    title: Enables AppArmor for Webhook
    description: |
      AppArmor is a security system for Linux.
      If a cluster supports AppArmor the Webhook uses it if it is enabled here.
      If it is not supported by a cluster it must not be enabled.
    default: false
  webhook.requests.cpu:
    type: string
    title: Webhook CPU request
    description: |
      The amount of CPU allocation the Webhook requests from the cluster.
      It is recommended for the CPU requests to be the same as the CPU limits.
    default: 300m
  webhook.requests.memory:
    type: string
    title: Webhook Memory request
    description: |
      The amount of memory allocation the Webhook requests from the cluster.
      It is recommended for the memory requests to be the same as the memory limits.
    default: 128Mi
  webhook.limits.cpu:
    type: string
    title: Webhook CPU limit
    description: |
      The amount of CPU allocation to which the cluster may limit the Webhook.
      It is recommended for the CPU limits to be the same as the CPU requests.
    default: 300m
  webhook.limits.memory:
    type: string
    title: Webhook Memory limit
    description: |
      The amount of memory allocation to which the cluster may limit the Webhook.
      It is recommended for the memory limits to be the same as the memory requests.
    default: 128Mi
  webhook.highAvailability:
    type: boolean
    title: (DEPRECATED) Enable Webhook's high availability mode
    description: (DEPRECATED) Increases replicas and adds topology constraints for the Webhook.
    default: false
  webhook.replicas:
    type: integer
    title: Webhook replicas
    description: |
      The number of replicas for the Webhook.
      Only used if webhook.highAvailability is set to true.
    default: 2
  webhook.podDisruptionBudget.minAvailable:
    type: integer
    title: Webhook Pod Disruption Budget minAvailable
    description: |
      The minimum number of available replicas for the Webhook.
      Only used if webhook.highAvailability is set to true.
    default: 1
  webhook.startupProbe.periodSeconds:
    type: integer
    title: Webhook startup probe periodSeconds
    description: How often (in seconds) to perform the startup probe. Defaults to 10.
  webhook.startupProbe.timeoutSeconds:
    type: integer
    title: Webhook startup probe timeoutSeconds
    description: Number of seconds after which the startup probe times out. Defaults to 5.
  webhook.startupProbe.failureThreshold:
    type: integer
    title: Webhook startup probe failureThreshold
    description: Number of times the startup probe can fail before giving up. Defaults to 1.

  csidriver.enabled:
    type: boolean
    title: Enables CSI driver
    description: The CloudNativeFullStack as well as AppOnly mode need the CSI driver to function properly.
    default: false
  csidriver.apparmor:
    type: boolean
    title: Enables AppArmor for CSI driver
    description: |
      AppArmor is a security system for Linux.
      If a cluster supports AppArmor the CSI driver uses it if it is enabled here.
      If it is not supported by a cluster it must not be enabled.
    default: false
  csidriver.provisioner.resources.requests.cpu:
    type: string
    title: CSI driver CPU request - provisioner
    description: |
      The amount of CPU allocation the CSI driver requests from the cluster.
      It is recommended for the CPU requests to be the same as the CPU limits.
    default: 300m
  csidriver.provisioner.resources.requests.memory:
    type: string
    title: CSI driver Memory request - provisioner
    description: |
      The amount of memory allocation the CSI driver requests from the cluster.
      It is recommended for the memory requests to be the same as the memory limits.
    default: 100Mi
  csidriver.provisioner.startupProbe.periodSeconds:
    type: integer
    title: CSI driver provisioner startup probe periodSeconds
    description: How often (in seconds) to perform the startup probe. Defaults to 10.
  csidriver.provisioner.startupProbe.timeoutSeconds:
    type: integer
    title: CSI driver provisioner startup probe timeoutSeconds
    description: Number of seconds after which the startup probe times out. Defaults to 5.
  csidriver.provisioner.startupProbe.failureThreshold:
    type: integer
    title: CSI driver provisioner startup probe failureThreshold
    description: Number of times the startup probe can fail before giving up. Defaults to 1.
  csidriver.server.resources.requests.cpu:
    type: string
    title: CSI driver CPU request - server
    description: |
      The amount of CPU allocation the CSI driver requests from the cluster.
      It is recommended for the CPU requests to be the same as the CPU limits.
    default: 50m
  csidriver.server.resources.requests.memory:
    type: string
    title: CSI driver Memory request - server
    description: |
      The amount of memory allocation the CSI driver requests from the cluster.
      It is recommended for the memory requests to be the same as the memory limits.
    default: 100Mi
  csidriver.server.resources.limits.cpu:
    type: string
    title: CSI driver CPU limit - server
    description: |
      The amount of CPU allocation to which the cluster may limit the CSI driver.
      It is recommended for the CPU limits to be the same as the CPU requests.
    default: 50m
  csidriver.server.resources.limits.memory:
    type: string
    title: CSI driver Memory limit - server
    description: |
      The amount of memory allocation to which the cluster may limit the CSI driver.
      It is recommended for the memory limits to be the same as the memory requests.
    default: 100Mi
  csidriver.registrar.resources.requests.cpu:
    type: string
    title: CSI driver CPU request - registrar
    description: |
      The amount of CPU allocation the CSI driver requests from the cluster.
      It is recommended for the CPU requests to be the same as the CPU limits.
    default: 20m
  csidriver.registrar.resources.requests.memory:
    type: string
    title: CSI driver Memory request - registrar
    description: |
      The amount of memory allocation the CSI driver requests from the cluster.
      It is recommended for the memory requests to be the same as the memory limits.
    default: 30Mi
  csidriver.registrar.resources.limits.cpu:
    type: string
    title: CSI driver CPU limit - registrar
    description: |
      The amount of CPU allocation to which the cluster may limit the CSI driver.
      It is recommended for the CPU limits to be the same as the CPU requests.
    default: 20m
  csidriver.registrar.resources.limits.memory:
    type: string
    title: CSI driver Memory limit - registrar
    description: |
      The amount of memory allocation to which the cluster may limit the CSI driver.
      It is recommended for the memory limits to be the same as the memory requests.
    default: 30Mi
  csidriver.livenessprobe.resources.requests.cpu:
    type: string
    title: CSI driver CPU request - livenessprobe
    description: |
      The amount of CPU allocation the CSI driver requests from the cluster.
      It is recommended for the CPU requests to be the same as the CPU limits.
    default: 20m
  csidriver.livenessprobe.resources.requests.memory:
    type: string
    title: CSI driver Memory request - livenessprobe
    description: |
      The amount of memory allocation the CSI driver requests from the cluster.
      It is recommended for the memory requests to be the same as the memory limits.
    default: 30Mi
  csidriver.livenessprobe.resources.limits.cpu:
    type: string
    title: CSI driver CPU limit - livenessprobe
    description: |
      The amount of CPU allocation to which the cluster may limit the CSI driver.
      It is recommended for the CPU limits to be the same as the CPU requests.
    default: 20m
  csidriver.livenessprobe.resources.limits.memory:
    type: string
    title: CSI driver Memory limit - livenessprobe
    description: |
      The amount of memory allocation to which the cluster may limit the CSI driver.
      It is recommended for the memory limits to be the same as the memory requests.
    default: 30Mi

  activeGate.readOnlyFs:
    type: boolean
    title: Mount filesystem in read-only mode
    description: Restricts ActiveGate deployments to mount filesystems read-only.
    default: false

  installCRD:
    type: boolean
    title: Install DynaKube CRD
    description: |
      Tells the Helm chart of the deployer to install the custom resource definition (CRD) of the DynaKube API.
    default: true
    enum:
      - true

  platform:
    type: string
    title: Platform
    description: |
      Platform to deploy on.
      Must be set to "google-marketplace" for GKE clusters.
    default: google-marketplace
    enum:
      - "google-marketplace"

  crdStorageMigrationJob:
    type: boolean
    title: Deploy helm hook
    default: false
    enum:
    - false
required:
- name
- namespace
