x-google-marketplace:
  schemaVersion: v2
  applicationApiVersion: v1beta1
  publishedVersion: 1.9.0
  publishedVersionMetadata:
    releaseNote: >-
      <!-- Release notes generated using configuration in .github/release.yml at v1.9.0 -->

      ## What's Changed
      ### Bugfixes 🪲
      * Reconcile KSPM before OA and LogMonitoring to avoid deadlock when OA connectioninfo is empty by @aorcholski in https://github.com/Dynatrace/dynatrace-operator/pull/6444
      * Reject non-DNS1035 DynaKube names in the CSI driver in https://github.com/Dynatrace/dynatrace-operator/pull/6439
      * Avoid conflict during upgrade with clusterrole-aggregation-controller rules by @andriisoldatenko in https://github.com/Dynatrace/dynatrace-operator/pull/6430
      * Do not fail if just created Service is not yet available by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6405
      * Reconcile k8s entity first to avoid recreating/updating settings objects by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6395
      * Check for unsafe hard links when unpacking codeModulesImage in CSI by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6387
      * Use a node selector instead of nodeName for Job by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6376
      * Reduce permissions on readonly mounted files by @aorcholski in https://github.com/Dynatrace/dynatrace-operator/pull/6350
      * Try before backing off mounting CSI volume by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6328
      * Fix check for conflicting DynaKubes for injection in namespaces by @StefanHauth in https://github.com/Dynatrace/dynatrace-operator/pull/6298
      * Fail silently on forbidden errors when fetching/creating KSPM settings by @jokuniew in https://github.com/Dynatrace/dynatrace-operator/pull/6297
      * Fix inconsistent OTLP injection logic by @StefanHauth in https://github.com/Dynatrace/dynatrace-operator/pull/6279
      * Fix error handling when creating bootstrapper secrets by @waodim in https://github.com/Dynatrace/dynatrace-operator/pull/6250
      * Don't requeue instantly in the provisioner when Dynatrace API is unavailable by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6239
      * Fix logmonsettings condition handling by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6101
      * Fix pmc handling inside the bootstrapper config reconciler by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6063
      * Set correct name of automatically created AG TLS secret when deleting it by @aorcholski in https://github.com/Dynatrace/dynatrace-operator/pull/6059
      * Fix CRD storageVersion problems by @gkrenn in https://github.com/Dynatrace/dynatrace-operator/pull/5964
      * Prevent false negative on name validation by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/5856

      ### Core changes 🎉
      * Bump dependencies to fix CVEs by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6428
      * Remove aggregated ClusterRole by @andriisoldatenko in https://github.com/Dynatrace/dynatrace-operator/pull/6417
      * Add SLSA build provenance attestations to release workflows by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6225
      * Implement HPA support feature in https://github.com/Dynatrace/dynatrace-operator/pull/6302
      * Removes v1beta3.DynaKube from the codebase + deprecates v1beta4 by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6320
      * Configurable startupProbes for operator components in https://github.com/Dynatrace/dynatrace-operator/pull/6291
      * Remove temp security permissions from api token in https://github.com/Dynatrace/dynatrace-operator/pull/6294
      * Remove roles for obsolete secrets in https://github.com/Dynatrace/dynatrace-operator/pull/6299
      * Migrate events from "" apigroup to events.k8s.io apigroup in https://github.com/Dynatrace/dynatrace-operator/pull/6262
      * Replace Pod self-fetches with env vars for OLM detection via downward API by @quatres in https://github.com/Dynatrace/dynatrace-operator/pull/6231
      * Implement dynatrace client debug levels by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6289
      * Improve dynatrace client user agent by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6286
      * Decrease DynaKube & EdgeConnect default requeue interval to 15m in https://github.com/Dynatrace/dynatrace-operator/pull/6287
      * Remove obsoleted feature flags by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6108
      * Add support for appArmorProfile in security context if supported by @gkrenn in https://github.com/Dynatrace/dynatrace-operator/pull/6107
      * Bump controller-runtime from 0.22.x to 0.23.1 in https://github.com/Dynatrace/dynatrace-operator/pull/6104
      * Add KSPM Settings reconciler by @0sewa0 in https://github.com/Dynatrace/dynatrace-operator/pull/6091
      * Allow use of nonroot-v2 SCC for CRD storage migration by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6022
      * Enable crdStorageMigrationJob per default by @gkrenn in https://github.com/Dynatrace/dynatrace-operator/pull/6016
      * Enable Metadata Enrichment implicitly when using OA injection mode by @waodim in https://github.com/Dynatrace/dynatrace-operator/pull/5996
      * Allow proxy serviceaccount to use privileged SCC by @aorcholski in https://github.com/Dynatrace/dynatrace-operator/pull/6326
      * Limit DynaKube names to 32 characters by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/5893
      * Send event on CRD version mismatch in https://github.com/Dynatrace/dynatrace-operator/pull/5876
      * Update event API version in support archive by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6307

      ### Helm changes ⛑️
      * Fix customPullSecret field in helm by @waodim in https://github.com/Dynatrace/dynatrace-operator/pull/6265
      * Omit security.openshift.io RBAC from default helm output by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6269
      * Move away from webhook.highAvailability mode by @waodim in https://github.com/Dynatrace/dynatrace-operator/pull/6176
      * Disable helm hook on Google Marketplace by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6030
      * Modify ActiveGate resource requests and limits by @stefan-falk-dt in https://github.com/Dynatrace/dynatrace-operator/pull/6076

      ### Component changes 🛠️
      * Add RollingUpdate to OneAgent, ActiveGate and LogMonitoring & deprecate FF oneagent-max-unavailable by @jokuniew in https://github.com/Dynatrace/dynatrace-operator/pull/6288
      * warning when activegate.rollingUpdate was used on k8s < 1.35 by @jokuniew in https://github.com/Dynatrace/dynatrace-operator/pull/6419
      * Move edgeconnect annotations to pod template by @gkrenn in https://github.com/Dynatrace/dynatrace-operator/pull/6325
      * Use kubernetes default imagePullPolicy by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6232
      * Configurable image pull policy for managed components by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6150
      * Add appProtocol field to ports for OTLP ingest by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6112
      * Validate duplicate protocol on server-side by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6121
      * Improve CSI driver compliance with CIS, PSS security standards by @jokuniew in https://github.com/Dynatrace/dynatrace-operator/pull/5875
      * Add CSI's priorityClass to node image pull job by @waodim in https://github.com/Dynatrace/dynatrace-operator/pull/5865
      * Increase default EEC PVC size by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6002
      * Use only one mount for CSI app-mounts by @waodim in https://github.com/Dynatrace/dynatrace-operator/pull/5968
      * Add automatic registry behaviour (feature flag, deprecation, validation changes) by @andriisoldatenko in https://github.com/Dynatrace/dynatrace-operator/pull/6227
      * Make otelc SecurityContext more strict by @aorcholski in https://github.com/Dynatrace/dynatrace-operator/pull/6011
      * Remove dynatrace-bootstrapper-certs if there are no certs by @aorcholski in https://github.com/Dynatrace/dynatrace-operator/pull/6062
      * Allow exposing pprof endpoint by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/5681
      * Set NodeConfigCollector seccompProfile to RuntimeDefault in https://github.com/Dynatrace/dynatrace-operator/pull/5970
      * edgeconnect: add seccompprofile and drop all capabilities by @andriisoldatenko in https://github.com/Dynatrace/dynatrace-operator/pull/5994
      * Remove oneagentapm package by @avorima in https://github.com/Dynatrace/dynatrace-operator/pull/6003

      **Full Changelog**: https://github.com/Dynatrace/dynatrace-operator/compare/v1.8.1...v1.9.0
    releaseTypes:
    - Feature
    recommended: true
  managedUpdates:
    kalmSupported: true
  images:
    ? ''
    : properties:
        image:
          type: FULL
  deployerServiceAccount:
    description: 'Service account used to configure the Dynatrace Operator'
    roles:
    - type: ClusterRole
      rulesType: CUSTOM
      rules:
      - apiGroups:
        - admissionregistration.k8s.io
        resources:
        - mutatingwebhookconfigurations
        verbs:
        - get
        - create
        - list
        - patch
      - apiGroups:
        - dynatrace.com
        resources:
        - dynakubes
        verbs:
        - get
        - list
        - create
        - patch
      - apiGroups:
        - apiextensions.k8s.io
        resources:
        - customresourcedefinitions
        verbs:
        - get
        - list
        - create
        - patch
      - apiGroups:
        - dynatrace.com
        resources:
        - dynakubes
        verbs:
        - get
        - list
        - watch
        - update
        - patch
      - apiGroups:
        - app.k8s.io
        resources:
        - applications
        verbs:
        - get
        - list
      - apiGroups:
        - storage.k8s.io
        resources:
        - csidrivers
        verbs:
        - '*'
      - apiGroups:
        - ''
        resources:
        - services
        - serviceaccounts
        verbs:
        - '*'
      - apiGroups:
        - rbac.authorization.k8s.io
        resources:
        - role
        - rolebinding
        - clusterroles
        - clusterrolebindings
        verbs:
        - '*'
      - apiGroups:
        - admissionregistration.k8s.io
        resources:
        - validatingwebhookconfigurations
        verbs:
        - '*'
      - apiGroups:
        - scheduling.k8s.io
        resources:
        - priorityclasses
        verbs:
          - get
          - create
          - patch
properties:
  name:
    type: string
    x-google-marketplace:
      type: NAME
  namespace:
    type: string
    x-google-marketplace:
      type: NAMESPACE
    default: dynatrace
  deployerHelm.image:
    type: string
    x-google-marketplace:
      type: DEPLOYER_IMAGE
  customPullSecret:
    type: string
    title: Custom pull secret
    description: If the Operator image is in a private registry, the name of the appropriate pull secret can be set here
    default: ""

  imageRef.pullPolicy:
    type: string
    title: Operator image pull policy
    description: Overrite the default image pull policy for the operator.
    default: ""
    enum:
      - IfNotPresent
      - Always
      - Never

  operator.apparmor:
    type: boolean
    title: Enables AppArmor for Operator
    description: |
      AppArmor is a security system for Linux.
      If a cluster supports AppArmor the Operator uses it if it is enabled here.
      If it is not supported by a cluster it must not be enabled.
    default: false
  operator.requests.cpu:
    type: string
    title: Operator CPU request
    description: The amount of CPU allocation the Operator requests from the cluster.
    default: 50m
  operator.requests.memory:
    type: string
    title: Operator Memory request
    description: The amount of memory allocation the Operator requests from the cluster.
    default: 64Mi
  operator.limits.cpu:
    type: string
    title: Operator  CPU limit
    description: The amount of CPU allocation to which the cluster may limit the Operator.
    default: 100m
  operator.limits.memory:
    type: string
    title: Operator Memory limit
    description: The amount of memory allocation to which the cluster may limit the Operator.
    default: 128Mi
  operator.startupProbe.periodSeconds:
    type: integer
    title: Operator startup probe periodSeconds
    description: How often (in seconds) to perform the startup probe. Defaults to 10.
    nullable: true
  operator.startupProbe.timeoutSeconds:
    type: integer
    title: Operator startup probe timeoutSeconds
    description: Number of seconds after which the startup probe times out. Defaults to 5.
    nullable: true
  operator.startupProbe.failureThreshold:
    type: integer
    title: Operator startup probe failureThreshold
    description: Number of times the startup probe can fail before giving up. Defaults to 1.
    nullable: true

  webhook.hostNetwork:
    type: boolean
    title: Webhook uses Host network
    description: |
      Allows the webhook to connect with and use the same network as the node.
      May alleviate issues with container network interfaces (CNI).
    default: false
  webhook.apparmor:
    type: boolean
    title: Enables AppArmor for Webhook
    description: |
      AppArmor is a security system for Linux.
      If a cluster supports AppArmor the Webhook uses it if it is enabled here.
      If it is not supported by a cluster it must not be enabled.
    default: false
  webhook.requests.cpu:
    type: string
    title: Webhook CPU request
    description: |
      The amount of CPU allocation the Webhook requests from the cluster.
      It is recommended for the CPU requests to be the same as the CPU limits.
    default: 300m
  webhook.requests.memory:
    type: string
    title: Webhook Memory request
    description: |
      The amount of memory allocation the Webhook requests from the cluster.
      It is recommended for the memory requests to be the same as the memory limits.
    default: 128Mi
  webhook.limits.cpu:
    type: string
    title: Webhook CPU limit
    description: |
      The amount of CPU allocation to which the cluster may limit the Webhook.
      It is recommended for the CPU limits to be the same as the CPU requests.
    default: 300m
  webhook.limits.memory:
    type: string
    title: Webhook Memory limit
    description: |
      The amount of memory allocation to which the cluster may limit the Webhook.
      It is recommended for the memory limits to be the same as the memory requests.
    default: 128Mi
  webhook.highAvailability:
    type: boolean
    title: (DEPRECATED) Enable Webhook's high availability mode
    description: (DEPRECATED) Increases replicas and adds topology constraints for the Webhook.
    default: false
  webhook.replicas:
    type: integer
    title: Webhook replicas
    description: |
      The number of replicas for the Webhook.
      Only used if webhook.highAvailability is set to true.
    default: 2
  webhook.podDisruptionBudget.minAvailable:
    type: integer
    title: Webhook Pod Disruption Budget minAvailable
    description: |
      The minimum number of available replicas for the Webhook.
      Only used if webhook.highAvailability is set to true.
    default: 1
  webhook.startupProbe.periodSeconds:
    type: integer
    title: Webhook startup probe periodSeconds
    description: How often (in seconds) to perform the startup probe. Defaults to 10.
    nullable: true
  webhook.startupProbe.timeoutSeconds:
    type: integer
    title: Webhook startup probe timeoutSeconds
    description: Number of seconds after which the startup probe times out. Defaults to 5.
    nullable: true
  webhook.startupProbe.failureThreshold:
    type: integer
    title: Webhook startup probe failureThreshold
    description: Number of times the startup probe can fail before giving up. Defaults to 1.
    nullable: true

  csidriver.enabled:
    type: boolean
    title: Enables CSI driver
    description: The CloudNativeFullStack as well as AppOnly mode need the CSI driver to function properly.
    default: false
  csidriver.apparmor:
    type: boolean
    title: Enables AppArmor for CSI driver
    description: |
      AppArmor is a security system for Linux.
      If a cluster supports AppArmor the CSI driver uses it if it is enabled here.
      If it is not supported by a cluster it must not be enabled.
    default: false
  csidriver.provisioner.resources.requests.cpu:
    type: string
    title: CSI driver CPU request - provisioner
    description: |
      The amount of CPU allocation the CSI driver requests from the cluster.
      It is recommended for the CPU requests to be the same as the CPU limits.
    default: 300m
  csidriver.provisioner.resources.requests.memory:
    type: string
    title: CSI driver Memory request - provisioner
    description: |
      The amount of memory allocation the CSI driver requests from the cluster.
      It is recommended for the memory requests to be the same as the memory limits.
    default: 100Mi
  csidriver.provisioner.startupProbe.periodSeconds:
    type: integer
    title: CSI driver provisioner startup probe periodSeconds
    description: How often (in seconds) to perform the startup probe. Defaults to 10.
    nullable: true
  csidriver.provisioner.startupProbe.timeoutSeconds:
    type: integer
    title: CSI driver provisioner startup probe timeoutSeconds
    description: Number of seconds after which the startup probe times out. Defaults to 5.
    nullable: true
  csidriver.provisioner.startupProbe.failureThreshold:
    type: integer
    title: CSI driver provisioner startup probe failureThreshold
    description: Number of times the startup probe can fail before giving up. Defaults to 1.
    nullable: true
  csidriver.server.resources.requests.cpu:
    type: string
    title: CSI driver CPU request - server
    description: |
      The amount of CPU allocation the CSI driver requests from the cluster.
      It is recommended for the CPU requests to be the same as the CPU limits.
    default: 50m
  csidriver.server.resources.requests.memory:
    type: string
    title: CSI driver Memory request - server
    description: |
      The amount of memory allocation the CSI driver requests from the cluster.
      It is recommended for the memory requests to be the same as the memory limits.
    default: 100Mi
  csidriver.server.resources.limits.cpu:
    type: string
    title: CSI driver CPU limit - server
    description: |
      The amount of CPU allocation to which the cluster may limit the CSI driver.
      It is recommended for the CPU limits to be the same as the CPU requests.
    default: 50m
  csidriver.server.resources.limits.memory:
    type: string
    title: CSI driver Memory limit - server
    description: |
      The amount of memory allocation to which the cluster may limit the CSI driver.
      It is recommended for the memory limits to be the same as the memory requests.
    default: 100Mi
  csidriver.registrar.resources.requests.cpu:
    type: string
    title: CSI driver CPU request - registrar
    description: |
      The amount of CPU allocation the CSI driver requests from the cluster.
      It is recommended for the CPU requests to be the same as the CPU limits.
    default: 20m
  csidriver.registrar.resources.requests.memory:
    type: string
    title: CSI driver Memory request - registrar
    description: |
      The amount of memory allocation the CSI driver requests from the cluster.
      It is recommended for the memory requests to be the same as the memory limits.
    default: 30Mi
  csidriver.registrar.resources.limits.cpu:
    type: string
    title: CSI driver CPU limit - registrar
    description: |
      The amount of CPU allocation to which the cluster may limit the CSI driver.
      It is recommended for the CPU limits to be the same as the CPU requests.
    default: 20m
  csidriver.registrar.resources.limits.memory:
    type: string
    title: CSI driver Memory limit - registrar
    description: |
      The amount of memory allocation to which the cluster may limit the CSI driver.
      It is recommended for the memory limits to be the same as the memory requests.
    default: 30Mi
  csidriver.livenessprobe.resources.requests.cpu:
    type: string
    title: CSI driver CPU request - livenessprobe
    description: |
      The amount of CPU allocation the CSI driver requests from the cluster.
      It is recommended for the CPU requests to be the same as the CPU limits.
    default: 20m
  csidriver.livenessprobe.resources.requests.memory:
    type: string
    title: CSI driver Memory request - livenessprobe
    description: |
      The amount of memory allocation the CSI driver requests from the cluster.
      It is recommended for the memory requests to be the same as the memory limits.
    default: 30Mi
  csidriver.livenessprobe.resources.limits.cpu:
    type: string
    title: CSI driver CPU limit - livenessprobe
    description: |
      The amount of CPU allocation to which the cluster may limit the CSI driver.
      It is recommended for the CPU limits to be the same as the CPU requests.
    default: 20m
  csidriver.livenessprobe.resources.limits.memory:
    type: string
    title: CSI driver Memory limit - livenessprobe
    description: |
      The amount of memory allocation to which the cluster may limit the CSI driver.
      It is recommended for the memory limits to be the same as the memory requests.
    default: 30Mi

  activeGate.readOnlyFs:
    type: boolean
    title: Mount filesystem in read-only mode
    description: Restricts ActiveGate deployments to mount filesystems read-only.
    default: false

  installCRD:
    type: boolean
    title: Install DynaKube CRD
    description: |
      Tells the Helm chart of the deployer to install the custom resource definition (CRD) of the DynaKube API.
    default: true
    enum:
      - true

  platform:
    type: string
    title: Platform
    description: |
      Platform to deploy on.
      Must be set to "google-marketplace" for GKE clusters.
    default: google-marketplace
    enum:
      - "google-marketplace"

  crdStorageMigrationJob:
    type: boolean
    title: Deploy helm hook
    default: false
    enum:
    - false
required:
- name
- namespace
