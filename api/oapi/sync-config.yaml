# Schema sync configuration for OpenAPI generator.
# Each schema entry supports the following fields (fields not marked (optional) are required):
#
# schemas:
#  - name: <string>                   # Schema name, used as the local directory under api/oapi/
#    specUrlEnvVar: <string>          # Name of the env var holding the full raw URL to the spec file
#                                     # e.g. https://raw.githubusercontent.com/org/repo/branch/spec3.json
#    authEnvVar: <string>             # (optional) Env var holding the Bearer token, omit for public specs
#    generate:                        # (optional) Generation config, omit to generate everything with defaults
#      packageName: <string>          # (optional) Go package name for the generated SDK (defaults to schema name)
#      generatorVersion: <string>     # (optional) Override openapi-generator version (defaults to generator-config.yaml)
#      additionalProperties: <string> # (optional) Extra generator properties, e.g. "enumClassPrefix=true"
#      globalProperties:              # (optional)
#        apis:                        # (optional) List of API names to generate (empty/omitted = all), models are autoresolved
#          - ApiName
#        additional: <string>         # (optional) Additional raw global properties
