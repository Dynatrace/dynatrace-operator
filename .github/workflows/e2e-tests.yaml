name: E2E tests

on:
  schedule:
    # every work day at 00:00 UTC
    - cron: 0 0 * * 1-5
  workflow_dispatch:
    inputs:
      e2e-make-target:
        description: 'Make target path under test/e2e/ to run instead of the default suite (e.g. "cloudnative/codemodules"). Leave empty to run the full default suite.'
        required: false
      target:
        description: 'Target branch to run E2E tests over (take precedence over nightly helm chart/image)'
        required: true
        default: 'main'
      helm-chart:
        description: 'Helm chart used for installation'
        type: choice
        options:
         - oci://ghcr.io/dynatrace/dynatrace-operator:0.0.0-nightly-chart
         - ""
      run-e2e-in-k8s:
        description: 'Run E2E tests in Kubernetes cluster'
        default: true
        required: false
        type: boolean
      run-e2e-in-k8s-platform-token:
        description: 'Run E2E tests in Kubernetes cluster with platform token'
        default: true
        required: false
        type: boolean
      run-e2e-in-k8s-phase3:
        description: 'Run E2E tests in Kubernetes cluster with phase 3 tenant'
        default: true
        required: false
        type: boolean
      run-e2e-in-ocp:
        description: 'Run E2E tests in OpenShift cluster'
        default: true
        required: false
        type: boolean
      run-e2e-in-ocp-platform-token:
        description: 'Run E2E tests in OpenShift cluster with platform token'
        default: true
        required: false
        type: boolean
      run-e2e-in-ocp-olm:
        description: 'Run OLM E2E tests in OpenShift cluster'
        default: true
        required: false
        type: boolean
      run-e2e-in-ocp-olm-platform-token:
        description: 'Run OLM E2E tests in OpenShift cluster platform token'
        default: true
        required: false
        type: boolean
      run-e2e-in-ocp-fips:
        description: 'Run E2E tests in using FIPS OpenShift cluster'
        default: true
        required: false
        type: boolean

permissions:
  checks: write

jobs:
  run-in-k8s:
    if: ${{ github.event.inputs.run-e2e-in-k8s != 'false' }}
    name: Run in Kubernetes latest (${{ github.event.inputs.target || 'main' }})
    permissions:
      checks: write
      pull-requests: write
    environment: E2E
    runs-on:
      - operator-e2e
    outputs:
      cluster_status: ${{ steps.run_e2e_test.outputs.cluster_status }}
      job_id: ${{ job.check_run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Run e2e test
        id: run_e2e_test
        uses: ./.github/actions/run-e2e
        with:
          flc-namespace: dto
          flc-environment: dto-k8s-latest-flc
          helm-chart: ${{ github.event.inputs.helm-chart || 'oci://ghcr.io/dynatrace/dynatrace-operator:0.0.0-nightly-chart' }}
          target-branch: ${{ github.event.inputs.target }}
          tenant1-name: ${{ secrets.TENANT1_NAME }}
          tenant1-apitoken: ${{ secrets.TENANT1_APITOKEN }}
          tenant1-apitoken-nosettings: ${{ secrets.TENANT1_APITOKEN_NOSETTINGS }}
          tenant1-dataingesttoken: ${{ secrets.TENANT1_DATAINGESTTOKEN }}
          tenant1-oauth-client-id: ${{ secrets.TENANT1_OAUTH_CLIENT_ID }}
          tenant1-oauth-secret: ${{ secrets.TENANT1_OAUTH_SECRET }}
          tenant1-oauth-urn: ${{ secrets.TENANT1_OAUTH_URN }}
          tenant1-platform-token: ${{ secrets.TENANT1_PLATFORM_TOKEN }}
          tenant1-platform-token-nosettings: ${{ secrets.TENANT1_PLATFORM_TOKEN_NOSETTINGS }}
          tenant1-dataingest-platform-token: ${{ secrets.TENANT1_DATAINGEST_PLATFORM_TOKEN }}
          tenant2-name: ${{ secrets.TENANT2_NAME }}
          tenant2-apitoken: ${{ secrets.TENANT2_APITOKEN }}
          tenant2-dataingesttoken: ${{ secrets.TENANT2_DATAINGESTTOKEN }}
          tenant2-platform-token: ${{ secrets.TENANT2_PLATFORM_TOKEN }}
          tenant-phase3-name: ${{ secrets.TENANT_PHASE3_NAME }}
          tenant-phase3-dataingesttoken: ${{ secrets.TENANT_PHASE3_DATAINGESTTOKEN }}
          tenant-phase3-oauth-client-id: ${{ secrets.TENANT_PHASE3_OAUTH_CLIENT_ID }}
          tenant-phase3-oauth-secret: ${{ secrets.TENANT_PHASE3_OAUTH_SECRET }}
          tenant-phase3-oauth-urn: ${{ secrets.TENANT_PHASE3_OAUTH_URN }}
          tenant-phase3-platform-token: ${{ secrets.TENANT_PHASE3_PLATFORM_TOKEN }}
          tenant-phase3-platform-token-nosettings: ${{ secrets.TENANT_PHASE3_PLATFORM_TOKEN_NOSETTINGS }}
          e2e-public-registry-override: ${{ vars.E2E_PUBLIC_REGISTRY_OVERRIDE }}
          e2e-make-target: ${{ github.event.inputs.e2e-make-target }}
      - name: Determine cluster status
        if: failure()
        env:
          CLUSTER_STATUS: ${{ steps.run_e2e_test.outputs.cluster_status }}
        run: |
          if [[ "$CLUSTER_STATUS" == "skipped" ]]; then
            exit 1
          fi

  run-in-k8s-platform-token:
