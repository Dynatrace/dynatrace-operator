          tenant-phase3-oauth-secret: ${{ secrets.TENANT_PHASE3_OAUTH_SECRET }}
          tenant-phase3-oauth-urn: ${{ secrets.TENANT_PHASE3_OAUTH_URN }}
          tenant-phase3-platform-token: ${{ secrets.TENANT_PHASE3_PLATFORM_TOKEN }}
          tenant-phase3-platform-token-nosettings: ${{ secrets.TENANT_PHASE3_PLATFORM_TOKEN_NOSETTINGS }}
          use-platform-token: "true"
          e2e-public-registry-override: ${{ vars.E2E_PUBLIC_REGISTRY_OVERRIDE }}
          e2e-make-target: ${{ github.event.inputs.e2e-make-target }}
      - name: Determine cluster status
        if: failure()
        env:
          CLUSTER_STATUS: ${{ steps.run_e2e_test.outputs.cluster_status }}
        run: |
          if [[ "$CLUSTER_STATUS" == "skipped" ]]; then
            exit 1
          fi
  run-in-ocp-fips:
    if: ${{ github.event.inputs.run-e2e-in-ocp-fips != 'false' }}
    name: Run in FIPS OpenShift (${{ github.event.inputs.target || 'main' }})
    permissions:
      checks: write
      pull-requests: write
    environment: E2E
    runs-on:
      - operator-e2e
    outputs:
      cluster_status: ${{ steps.run_e2e_test.outputs.cluster_status }}
      job_id: ${{ job.check_run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Run e2e test
        id: run_e2e_test
        uses: ./.github/actions/run-e2e
        with:
          flc-namespace: dto
          flc-environment: dto-ocp-fips
          target-branch: ${{ github.event.inputs.target }}
          tenant1-name: ${{ secrets.TENANT1_NAME }}
          tenant1-apitoken: ${{ secrets.TENANT1_APITOKEN }}
          tenant1-apitoken-nosettings: ${{ secrets.TENANT1_APITOKEN_NOSETTINGS }}
          tenant1-dataingesttoken: ${{ secrets.TENANT1_DATAINGESTTOKEN }}
          tenant1-oauth-client-id: ${{ secrets.TENANT1_OAUTH_CLIENT_ID }}
          tenant1-oauth-secret: ${{ secrets.TENANT1_OAUTH_SECRET }}
          tenant1-oauth-urn: ${{ secrets.TENANT1_OAUTH_URN }}
          tenant1-platform-token: ${{ secrets.TENANT1_PLATFORM_TOKEN }}
          tenant1-platform-token-nosettings: ${{ secrets.TENANT1_PLATFORM_TOKEN_NOSETTINGS }}
          tenant1-dataingest-platform-token: ${{ secrets.TENANT1_DATAINGEST_PLATFORM_TOKEN }}
          tenant2-name: ${{ secrets.TENANT2_NAME }}
          tenant2-apitoken: ${{ secrets.TENANT2_APITOKEN }}
          tenant2-dataingesttoken: ${{ secrets.TENANT2_DATAINGESTTOKEN }}
          tenant2-platform-token: ${{ secrets.TENANT2_PLATFORM_TOKEN }}
          tenant-phase3-name: ${{ secrets.TENANT_PHASE3_NAME }}
          tenant-phase3-dataingesttoken: ${{ secrets.TENANT_PHASE3_DATAINGESTTOKEN }}
          tenant-phase3-oauth-client-id: ${{ secrets.TENANT_PHASE3_OAUTH_CLIENT_ID }}
          tenant-phase3-oauth-secret: ${{ secrets.TENANT_PHASE3_OAUTH_SECRET }}
          tenant-phase3-oauth-urn: ${{ secrets.TENANT_PHASE3_OAUTH_URN }}
          tenant-phase3-platform-token: ${{ secrets.TENANT_PHASE3_PLATFORM_TOKEN }}
          tenant-phase3-platform-token-nosettings: ${{ secrets.TENANT_PHASE3_PLATFORM_TOKEN_NOSETTINGS }}
          e2e-public-registry-override: ${{ vars.E2E_PUBLIC_REGISTRY_OVERRIDE }}
          e2e-make-target: ${{ github.event.inputs.e2e-make-target }}
      - name: Determine cluster status
        if: failure()
        env:
          CLUSTER_STATUS: ${{ steps.run_e2e_test.outputs.cluster_status }}
        run: |
          if [[ "$CLUSTER_STATUS" == "skipped" ]]; then
            exit 1
          fi


  notify-slack:
    name: Notify test results in Slack
    environment: E2E
    needs: [ "run-in-k8s", "run-in-k8s-platform-token", "run-in-ocp", "run-in-ocp-platform-token", "run-in-ocp-fips", "run-in-ocp-olm", "run-in-ocp-olm-platform-token"]
    runs-on: ubuntu-24.04
    if: ${{ always() }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set Slack message
        id: set_slack_message
        env:
          TARGET_BRANCH: ${{ github.event.inputs.target || 'main' }}
          E2E_MAKE_TARGET: ${{ github.event.inputs.e2e-make-target }}
          K8S_CLUSTER_STATUS: ${{ needs.run-in-k8s.outputs.cluster_status }}
          K8S_JOB_ID: ${{ needs.run-in-k8s.outputs.job_id }}
          K8S_RESULT: ${{ needs.run-in-k8s.result }}
          K8S_PLATFORM_TOKEN_CLUSTER_STATUS: ${{ needs.run-in-k8s-platform-token.outputs.cluster_status }}
          K8S_PLATFORM_TOKEN_JOB_ID: ${{ needs.run-in-k8s-platform-token.outputs.job_id }}
          K8S_PLATFORM_TOKEN_RESULT: ${{ needs.run-in-k8s-platform-token.result }}
          OCP_CLUSTER_STATUS: ${{ needs.run-in-ocp.outputs.cluster_status }}
          OCP_JOB_ID: ${{ needs.run-in-ocp.outputs.job_id }}
          OCP_RESULT: ${{ needs.run-in-ocp.result }}
          OCP_PLATFORM_TOKEN_CLUSTER_STATUS: ${{ needs.run-in-ocp-platform-token.outputs.cluster_status }}
          OCP_PLATFORM_TOKEN_JOB_ID: ${{ needs.run-in-ocp-platform-token.outputs.job_id }}
          OCP_PLATFORM_TOKEN_RESULT: ${{ needs.run-in-ocp-platform-token.result }}
          OCP_FIPS_CLUSTER_STATUS: ${{ needs.run-in-ocp-fips.outputs.cluster_status }}
          OCP_FIPS_JOB_ID: ${{ needs.run-in-ocp-fips.outputs.job_id }}
          OCP_FIPS_RESULT: ${{ needs.run-in-ocp-fips.result }}
          OCP_OLM_CLUSTER_STATUS: ${{ needs.run-in-ocp-olm.outputs.cluster_status }}
          OCP_OLM_JOB_ID: ${{ needs.run-in-ocp-olm.outputs.job_id }}
          OCP_OLM_RESULT: ${{ needs.run-in-ocp-olm.result }}
          OCP_OLM_PLATFORM_TOKEN_CLUSTER_STATUS: ${{ needs.run-in-ocp-olm-platform-token.outputs.cluster_status }}
          OCP_OLM_PLATFORM_TOKEN_JOB_ID: ${{ needs.run-in-ocp-olm-platform-token.outputs.job_id }}
          OCP_OLM_PLATFORM_TOKEN_RESULT: ${{ needs.run-in-ocp-olm-platform-token.result }}
        run: |
          get_emoji() {
            if [ "$1" = "skipped" ] || [ "$2" = "skipped" ]; then
              echo "large_yellow_circle"
            elif [ "$2" = "success" ]; then
              echo "white_check_mark"
            else
              echo "red_circle"
            fi
          }
          K8S_STATUS=$(get_emoji "${K8S_CLUSTER_STATUS}" "${K8S_RESULT}")
          K8S_PLATFORM_TOKEN_STATUS=$(get_emoji "${K8S_PLATFORM_TOKEN_CLUSTER_STATUS}" "${K8S_PLATFORM_TOKEN_RESULT}")
          OCP_STATUS=$(get_emoji "${OCP_CLUSTER_STATUS}" "${OCP_RESULT}")
          OCP_PLATFORM_TOKEN_STATUS=$(get_emoji "${OCP_PLATFORM_TOKEN_CLUSTER_STATUS}" "${OCP_PLATFORM_TOKEN_RESULT}")
          OCP_FIPS_STATUS=$(get_emoji "${OCP_FIPS_CLUSTER_STATUS}" "${OCP_FIPS_RESULT}")
          OCP_OLM_STATUS=$(get_emoji "${OCP_OLM_CLUSTER_STATUS}" "${OCP_OLM_RESULT}")
          OCP_OLM_PLATFORM_TOKEN_STATUS=$(get_emoji "${OCP_OLM_PLATFORM_TOKEN_CLUSTER_STATUS}" "${OCP_OLM_PLATFORM_TOKEN_RESULT}")

          echo "K8S_STATUS=$K8S_STATUS" >> $GITHUB_ENV
          echo "K8S_JOB_ID=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/job/${K8S_JOB_ID}" >> $GITHUB_ENV

          echo "K8S_PLATFORM_TOKEN_STATUS=$K8S_PLATFORM_TOKEN_STATUS" >> $GITHUB_ENV
          echo "K8S_PLATFORM_TOKEN_JOB_ID=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/job/${K8S_PLATFORM_TOKEN_JOB_ID}" >> $GITHUB_ENV

          echo "OCP_STATUS=$OCP_STATUS" >> $GITHUB_ENV
          echo "OCP_JOB_ID=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/job/${OCP_JOB_ID}" >> $GITHUB_ENV

          echo "OCP_PLATFORM_TOKEN_STATUS=$OCP_PLATFORM_TOKEN_STATUS" >> $GITHUB_ENV
          echo "OCP_PLATFORM_TOKEN_JOB_ID=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/job/${OCP_PLATFORM_TOKEN_JOB_ID}" >> $GITHUB_ENV

          echo "OCP_FIPS_STATUS=$OCP_FIPS_STATUS" >> $GITHUB_ENV
          echo "OCP_FIPS_JOB_ID=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/job/${OCP_FIPS_JOB_ID}" >> $GITHUB_ENV

          echo "OCP_OLM_STATUS=$OCP_OLM_STATUS" >> $GITHUB_ENV
          echo "OCP_OLM_JOB_ID=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/job/${OCP_OLM_JOB_ID}" >> $GITHUB_ENV

          echo "OCP_OLM_PLATFORM_TOKEN_STATUS=$OCP_OLM_PLATFORM_TOKEN_STATUS" >> $GITHUB_ENV
          echo "OCP_OLM_PLATFORM_TOKEN_JOB_ID=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/job/${OCP_OLM_PLATFORM_TOKEN_JOB_ID}" >> $GITHUB_ENV

          echo "TARGET_BRANCH=$TARGET_BRANCH" >> $GITHUB_ENV

          if [ -n "$E2E_MAKE_TARGET" ]; then
            echo "MAKE_TARGET_INFO=run via \`make test/e2e/$E2E_MAKE_TARGET/publish\`" >> $GITHUB_ENV
          else
            echo "MAKE_TARGET_INFO=" >> $GITHUB_ENV
          fi
      - name: Notify in Slack
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          errors: true
          payload-templated: true
          payload-file-path: ./hack/slack/slack-e2e-payload.json
