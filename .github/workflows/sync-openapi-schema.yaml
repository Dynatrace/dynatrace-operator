name: Sync OpenAPI schemas

on:
  workflow_dispatch:

permissions: {}

jobs:
  prepare:
    name: Read sync config
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      schemas_json: ${{ steps.config.outputs.schemas_json }}
      has_schemas: ${{ steps.config.outputs.has_schemas }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: 'false'
      - name: Parse sync config
        id: config
        run: |
          set -euo pipefail
          schemas=$(yq -o=json -I=0 '.schemas // []' api/oapi/sync-config.yaml)
          count=$(echo "${schemas}" | jq 'length')

          if [ "${count}" -eq 0 ]; then
            echo "No schemas configured, nothing to sync."
            echo "has_schemas=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_schemas=true" >> "$GITHUB_OUTPUT"
            echo "schemas_json=${schemas}" >> "$GITHUB_OUTPUT"
            echo "Schemas (${count}): ${schemas}"
          fi

  sync-schemas:
    name: Sync OpenAPI schemas
    needs: prepare
    if: needs.prepare.outputs.has_schemas == 'true'
    runs-on: self-hosted
    permissions:
      contents: write
      pull-requests: write
    env:
      TENANT_API_V2_SPEC_URL: ${{ secrets.TENANT_API_V2_SPEC_URL }}
      TENANT_API_V2_TOKEN: ${{ secrets.BITBUCKET_ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Generate Go SDKs
        run: make oapi/generate

      - name: Check for changes
        id: sync
        run: |
          set -euo pipefail

          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes detected, nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          schemas_summary=$(echo "${SCHEMAS_JSON}" | jq -r '[.[].name] | join(", ")')
          apis_summary=$(echo "${SCHEMAS_JSON}" | jq -r '.[] | .name + ": " + (.generate.globalProperties.apis // [] | if length == 0 then "all" else join(", ") end)' | paste -sd ', ')

          output_dir=$(yq -r '.outputDir' api/oapi/generator-config.yaml)
          git add "${output_dir}/"
          diff_stat=$(git diff --cached --stat HEAD | tail -1)
          diff_details=$(git diff --cached --stat HEAD)
          changed_packages=$(git diff --cached --name-only HEAD | grep "^${output_dir}/" | sed "s|^${output_dir}/||" | cut -d'/' -f1 | sort -u | tr '\n' ' ' || true)

          pr_body="# Description"$'\n'"This PR syncs OpenAPI schemas and regenerates Go clients."$'\n\n'
          pr_body+="| | |"$'\n'"|---|---|"$'\n'
          pr_body+="| **Schemas** | \`${schemas_summary}\` |"$'\n'
          pr_body+="| **APIs generated** | \`${apis_summary}\` |"$'\n'
          pr_body+="| **Packages changed** | \`${changed_packages}\` |"$'\n'
          pr_body+="| **Changes** | \`${diff_stat}\` |"$'\n'
          pr_body+="| **Workflow run** | [#${WORKFLOW_RUN_NUMBER}](${WORKFLOW_RUN_URL}) |"$'\n'
          pr_body+=$'\n''<details><summary>Changed files</summary>'$'\n\n''```'$'\n'"${diff_details}"$'\n''```'$'\n''</details>'

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "schemas_summary=${schemas_summary}" >> "$GITHUB_OUTPUT"

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "pr_body<<${EOF}" >> "$GITHUB_OUTPUT"
          echo "${pr_body}" >> "$GITHUB_OUTPUT"
          echo "${EOF}" >> "$GITHUB_OUTPUT"
        env:
          SCHEMAS_JSON: ${{ needs.prepare.outputs.schemas_json }}
          WORKFLOW_RUN_NUMBER: ${{ github.run_number }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Create pull request
        if: steps.sync.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          base: main
          delete-branch: true
          branch: sync-openapi-schemas
          add-paths: |
            pkg/clients/generated/
          title: "chore: sync OpenAPI schemas (${{ steps.sync.outputs.schemas_summary }})"
          commit-message: "chore: sync OpenAPI schemas (${{ steps.sync.outputs.schemas_summary }})"
          body: ${{ steps.sync.outputs.pr_body }}
