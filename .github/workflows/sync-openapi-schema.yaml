name: Sync OpenAPI schemas

on:
  workflow_dispatch:

permissions: {}

jobs:
  prepare:
    name: Read config
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      schemas_json: ${{ steps.config.outputs.schemas_json }}
      has_schemas: ${{ steps.config.outputs.has_schemas }}
      output_dir: ${{ steps.config.outputs.output_dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: 'false'
      - name: Parse config
        id: config
        run: |
          set -euo pipefail
          schemas=$(yq -o=json -I=0 '.schemas // []' api/oapi/sync-config.yaml)
          count=$(echo "${schemas}" | jq 'length')
          output_dir=$(yq -r '.outputDir' api/oapi/generator-config.yaml)

          if [ "${count}" -eq 0 ]; then
            echo "No schemas configured, nothing to sync."
            echo "has_schemas=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_schemas=true" >> "$GITHUB_OUTPUT"
            echo "schemas_json=${schemas}" >> "$GITHUB_OUTPUT"
            echo "Schemas (${count}): ${schemas}"
          fi
          echo "output_dir=${output_dir}" >> "$GITHUB_OUTPUT"

  sync-schemas:
    name: Sync OpenAPI schemas
    needs: prepare
    if: needs.prepare.outputs.has_schemas == 'true'
    runs-on: operator-e2e
    environment: oapi
    permissions:
      contents: write
      pull-requests: write
    # env vars for specUrlEnvVar / authEnvVar referenced in sync-config.yaml must be added here as secrets
    env:
      TENANT_API_V2_SPEC_URL: ${{ secrets.TENANT_API_V2_SPEC_URL }} # URL to the OpenAPI spec file for the tenant api v2 (Environment V2)
      BITBUCKET_ACCESS_TOKEN: ${{ secrets.BITBUCKET_ACCESS_TOKEN }} # Access token for bitbucket repos
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y make

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 'stable'
          cache: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          package-manager-cache: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Generate Go SDKs
        run: make oapi/generate

      - name: Check for changes
        id: sync
        env:
          SCHEMAS_JSON: ${{ needs.prepare.outputs.schemas_json }}
          OUTPUT_DIR: ${{ needs.prepare.outputs.output_dir }}
          WORKFLOW_RUN_NUMBER: ${{ github.run_number }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes detected, nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          schemas_summary=$(echo "${SCHEMAS_JSON}" | jq -r '[.[].name] | join(", ")')
          apis_summary=$(echo "${SCHEMAS_JSON}" | jq -r '[.[] | .name + ": " + (.generate.globalProperties.apis // [] | if length == 0 then "all" else join(", ") end)] | join(", ")')

          changed_packages=$(git status --porcelain -u | sed 's/^...//' | grep "^${OUTPUT_DIR}/" | sed "s|^${OUTPUT_DIR}/||" | cut -d'/' -f1 | sort -u | tr '\n' ' ' || true)


          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "schemas_summary=${schemas_summary}" >> "$GITHUB_OUTPUT"

          {
            echo 'pr_body<<EOF'
            cat <<EOF
          # Description
          This PR syncs OpenAPI schemas and (re-)generates Go clients.

          | | |
          |---|---|
          | **Schemas** | \`${schemas_summary}\` |
          | **APIs generated** | \`${apis_summary}\` |
          | **Packages changed** | \`${changed_packages}\` |
          | **Workflow run** | [#${WORKFLOW_RUN_NUMBER}](${WORKFLOW_RUN_URL}) |
          EOF
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.sync.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          base: main
          delete-branch: true
          branch: sync-openapi-schemas
          title: "chore: sync OpenAPI schemas (${{ steps.sync.outputs.schemas_summary }})"
          commit-message: "chore: sync OpenAPI schemas (${{ steps.sync.outputs.schemas_summary }})"
          body: ${{ steps.sync.outputs.pr_body }}
