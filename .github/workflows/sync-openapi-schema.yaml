name: Sync OpenAPI schemas

on:
  workflow_dispatch:

permissions: {}

jobs:
  prepare:
    name: Read sync config
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.config.outputs.matrix }}
      schemas_json: ${{ steps.config.outputs.schemas_json }}
      has_schemas: ${{ steps.config.outputs.has_schemas }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: 'false'
      - name: Parse config into matrix
        id: config
        run: |
          set -euo pipefail
          schemas=$(yq -o=json -I=0 '.schemas // []' api/oapi/sync-config.yaml)
          count=$(echo "${schemas}" | jq 'length')

          if [ "${count}" -eq 0 ]; then
            echo "No schemas configured, nothing to sync."
            echo "has_schemas=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_schemas=true" >> "$GITHUB_OUTPUT"
            echo "matrix={\"include\":${schemas}}" >> "$GITHUB_OUTPUT"
            echo "schemas_json=${schemas}" >> "$GITHUB_OUTPUT"
            echo "Schemas (${count}): ${schemas}"
          fi

  sync-schemas:
    name: Sync OpenAPI schemas
    needs: prepare
    if: needs.prepare.outputs.has_schemas == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      # Per-schema secrets — add entries here when adding new schemas to sync-config.yaml
      TENANT_API_V2_REPO_URL: ${{ secrets.TENANT_API_V2_REPO_URL }}
      TENANT_API_V2_TOKEN: ${{ secrets.TENANT_API_V2_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Fetch specs
        run: |
          set -euo pipefail
          for row in $(echo "${SCHEMAS_JSON}" | jq -c '.[]'); do
            name=$(echo "${row}" | jq -r '.name')
            repo_var=$(echo "${row}" | jq -r '.repoEnvVar // ""')
            spec_path=$(echo "${row}" | jq -r '.specPath // "spec3.json"')
            auth_var=$(echo "${row}" | jq -r '.authEnvVar // ""')

            repo_url=$([ -n "${repo_var}" ] && printenv "${repo_var}" || echo "")
            auth_val=$([ -n "${auth_var}" ] && printenv "${auth_var}" || echo "")

            [ -n "${repo_url}" ] || { echo "WARNING: repoEnvVar '${repo_var}' not set for ${name}, skipping."; continue; }

            echo "Fetching ${name} from ${repo_url}/${spec_path}..."
            mkdir -p "api/oapi/${name}"
            curl -sSfL \
              ${auth_val:+-H "Authorization: Bearer ${auth_val}"} \
              "${repo_url}/${spec_path}" \
              -o "api/oapi/${name}/spec3.json"

            sed -E -i 's/(dt[^.]*)\.([A-Z0-9]{8})(\.([A-Z0-9]{64})?|)/example-token/g' "api/oapi/${name}/spec3.json"
          done
        env:
          SCHEMAS_JSON: ${{ needs.prepare.outputs.schemas_json }}

      - name: Generate Go SDKs
        run: make oapi/generate

      - name: Check for changes
        id: sync
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No changes detected, nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pr_body="# Description"$'\n'"This PR syncs OpenAPI schemas from the source repositories."$'\n\n'
          pr_body+="| Schema | API version | Source URL |"$'\n'
          pr_body+="|---|---|---|"$'\n'
          schemas_summary=""

          for row in $(echo "${SCHEMAS_JSON}" | jq -c '.[]'); do
            name=$(echo "${row}" | jq -r '.name')
            repo_var=$(echo "${row}" | jq -r '.repoEnvVar // ""')
            spec_path=$(echo "${row}" | jq -r '.specPath // "spec3.json"')
            repo_url=$([ -n "${repo_var}" ] && printenv "${repo_var}" || echo "")
            target_file="api/oapi/${name}/spec3.json"

            git diff --quiet "${target_file}" 2>/dev/null && continue

            old_version=$(git show HEAD:"${target_file}" 2>/dev/null | jq -r '.info.version // "unknown"' 2>/dev/null || echo "N/A")
            new_version=$(jq -r '.info.version // "unknown"' "${target_file}")

            pr_body+="| \`${name}\` | \`${old_version}\` → \`${new_version}\` | \`${repo_url}/${spec_path}\` |"$'\n'
            schemas_summary+="${name}, "
          done

          schemas_summary="${schemas_summary%, }"
          pr_body+=$'\n'"| | |"$'\n'"|---|---|"$'\n'
          pr_body+="| **Workflow run** | [#${WORKFLOW_RUN_NUMBER}](${WORKFLOW_RUN_URL}) |"$'\n'

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "schemas_summary=${schemas_summary}" >> "$GITHUB_OUTPUT"

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "pr_body<<${EOF}" >> "$GITHUB_OUTPUT"
          echo "${pr_body}" >> "$GITHUB_OUTPUT"
          echo "${EOF}" >> "$GITHUB_OUTPUT"
        env:
          SCHEMAS_JSON: ${{ needs.prepare.outputs.schemas_json }}
          WORKFLOW_RUN_NUMBER: ${{ github.run_number }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Create pull request
        if: steps.sync.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          base: main
          delete-branch: true
          branch: sync-openapi-schemas
          add-paths: |
            api/oapi/*/spec3.json
            pkg/clients/generated/
            go.mod
            go.sum
          title: "chore: sync OpenAPI schemas (${{ steps.sync.outputs.schemas_summary }})"
          commit-message: "chore: sync OpenAPI schemas (${{ steps.sync.outputs.schemas_summary }})"
          body: ${{ steps.sync.outputs.pr_body }}
