name: Create SBOM
on:
  workflow_call:
    inputs:
      image:
        description: full image reference to scan
        required: true
        type: string
      artifact-name:
        description: name for the uploaded SBOM artifact
        required: true
        type: string
      registry:
        description: registry to authenticate against before scanning (optional)
        required: false
        type: string
        default: ''
    secrets:
      registry-token:
        description: token for registry authentication
        required: false
      registry-username:
        description: username for registry authentication
        required: false
permissions:
  id-token: write
jobs:
  create-sbom:
    runs-on: ubuntu-24.04
    steps:
      - name: Login to Registry
        if: ${{ inputs.registry != '' && inputs.registry != 'public.ecr.aws' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.registry-username }}
          password: ${{ secrets.registry-token }}
      - name: Configure aws credentials
        if: ${{ inputs.registry == 'public.ecr.aws' }}
        uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59 # v6.1.3
        with:
          role-to-assume: ${{ secrets.registry-token }}
          aws-region: us-east-1
      - name: Login to Amazon ECR
        if: ${{ inputs.registry == 'public.ecr.aws' }}
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5
        with:
          registry-type: public
      - name: Create SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ inputs.image }}
          format: 'cyclonedx'
          output: 'result.json'
          skip-dirs: '/usr/share/dynatrace-operator/third_party_licenses'
          skip-files: '/usr/local/bin/dynatrace-operator'
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: result.json
          retention-days: 1
