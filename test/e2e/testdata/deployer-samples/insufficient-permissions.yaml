apiVersion: v1
kind: ServiceAccount
metadata:
  name: dynatrace-deployer-insufficient
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dynatrace-deployer-insufficient
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dynatrace-deployer-insufficient
subjects:
  - kind: ServiceAccount
    name: dynatrace-deployer-insufficient
    namespace: default
---
# Deliberately missing: apiextensions.k8s.io (CRDs), admissionregistration.k8s.io (webhooks),
# and rbac.authorization.k8s.io permissions. This should cause helm install to fail.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dynatrace-deployer-insufficient
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "serviceaccounts", "services"]
    verbs: ["create", "get", "update", "delete", "list"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create"]
  - apiGroups: ["apps"]
    resources: ["daemonsets", "deployments"]
    verbs: ["create", "get", "update", "delete", "list"]
